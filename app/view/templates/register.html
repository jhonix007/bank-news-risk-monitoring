{% extends "base.html" %}
{% block title %}Регистрация{% endblock %}
{% block content %}
<section class="form-page">
  <form class="panel form-card" method="post" action="/register">
    <h1>Создать аккаунт</h1>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <label>Email<input name="email" type="email" value="{{ email or '' }}" required></label>
    <label>Пароль<input name="password" type="password" minlength="6" required></label>
    <button class="button primary" type="submit">Создать аккаунт</button>
  </form>
</section>
{% endblock %}
