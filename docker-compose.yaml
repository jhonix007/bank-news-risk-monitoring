services:
  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    command: uvicorn api:app --host 0.0.0.0 --port 8080 --reload
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - ./app:/app
      - ./ml_worker:/ml_worker:ro
      - ./models:/model_artifacts:ro
      - ./storage:/app/storage
    environment:
      MODEL_PATH: /model_artifacts/tfidf_student_v2b.joblib
    depends_on:
      db:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  ml_worker:
    build:
      context: .
      dockerfile: ml_worker/Dockerfile
    command: watchfiles "python -m worker" /worker
    env_file:
      - .env
    volumes:
      - ./app:/app:ro
      - ./ml_worker:/worker
      - ./models:/model_artifacts:ro
      - ./storage:/worker/storage
    environment:
      MODEL_PATH: /model_artifacts/tfidf_student_v2b.joblib
    depends_on:
      db:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bank_news}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
